<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Riddles</title>
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo"><img src="./img/logo.png"></a>
            <button class="navbar-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <ul class="navbar-menu">
                <li><a href="javascript:0" onclick="goToPageBasedOnLogin('levels.html','login.html')">Levels</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="javascript:void(0);" onclick="openSettings()"><i class="fa fa-cog"
                            aria-hidden="true"></i></a></li>
            </ul>
        </div>
    </nav>

    <div class="home-screen">
        <div class="home-div">
            <div class="home-logo">🍒</div>
            <div class="home-title">Fruit Riddles <br>Crush The Fruits</div>
            <div class="play-div">
                <button class="big-play-btn" onclick="window.location.href='login.html'">Play Now</button>
            </div>
        </div>

        <div class="bg-floating-fruit">🍒</div>
        <div class="bg-floating-fruit">🥝</div>
        <div class="bg-floating-fruit">🥑</div>
        <div class="bg-floating-fruit">🍎</div>
        <div class="bg-floating-fruit">🍇</div>
        <div class="bg-floating-fruit">🍌</div>
        <div class="bg-floating-fruit">🍊</div>
        <div class="bg-floating-fruit">🍍</div>
        <div class="bg-floating-fruit">🥭</div>
        <div class="bg-floating-fruit">🍒</div>
        <div class="bg-floating-fruit">🥝</div>
        <div class="bg-floating-fruit">🥑</div>
        <div class="bg-floating-fruit">🌶</div>
        <div class="bg-floating-fruit">🍎</div>
        <div class="bg-floating-fruit">🍇</div>
        <div class="bg-floating-fruit">🍌</div>
        <div class="bg-floating-fruit">🍊</div>
        <div class="bg-floating-fruit">🍍</div>
        <div class="bg-floating-fruit">🥭</div>

    </div>

    <!-- SETTINGS MODAL -->
    <div id="settingsModal" class="settings-Modal">
        <div class="modal-content">
            <div class="settings-header">
                <span>Settings</span>
                <button class="close-btn" onclick="closeSettings()">
                    <i class="fa-solid fa-x"></i>
                </button>
            </div>

            <div class="player-card">
                <img src="./img/avatar.png" class="avatar" alt="avatar">
                <div class="player-info">
                    <div class="name-row">
                        <span class="player-name" id="playerName">Player_Name</span>

                        <input type="text" id="nameInput" class="name-input" style="display:none;" />
                        
                        <button class="edit-btn" onclick="enableEdit()">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                    </div>
                    <input type="text" id="nameInput" class="name-input" />
                    <div class="player-id" id="playerExtra">ID: 4545454</div>
                </div>
            </div>

            <button class="logout-btn" onclick="logout()">Log out</button>

            <div class="bottom-row">
                <div class="follow-icons">Follow us:
                    <div class="small-circle"><i class="fa-brands fa-facebook-f"></i></div>
                    <div class="small-circle"><i class="fa-brands fa-instagram"></i></div>
                </div>

                <div class="icon-group">
                    <div class="small-circle" onclick="toggleMusic()">
                        <i class="fa-solid fa-music" id="music-icon"></i>
                    </div>
                    <div class="small-circle" onclick="toggleSound()">
                        <i class="fa-solid fa-volume-high" id="sound-icon"></i>
                    </div>

                    <div class="small-circle">
                        <button id="theme-toggle" class="theme-btn">
                            <i id="theme-icon" class="fas fa-moon"></i> 
                        </button>
                    </div>

                </div>

                <div class="version">V1.4v1.2</div>
            </div>
        </div>

        <audio id="bg-music" src="./audio/song1.mp3" loop hidden></audio>
        <script src="js/script.js"></script>
</body>

</html>
