<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Riddles</title>
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
</head>

<body>

    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo"><img src="./img/logo.png" width="100px" height="100px"></a>
            <button class="navbar-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <ul class="navbar-menu">
                <li><a href="levels.html">Levels</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="javascript:void(0);" onclick="openSettings()"><i class="fa fa-cog"
                            aria-hidden="true"></i></a></li>
            </ul>
        </div>
    </nav>

    <div class="screen" id="level-screen">
        <div class="level-life-container">
            <div><i class="fa-solid fa-heart"></i><span id="lives-val">5</span></div>
            <div id="timer-text">Full Energy</div>
        </div>
        <div class="levels-card">
            <h3>Select Level</h3>
            <div class="level-grid" id="lvl-container">
                <div class="lvl-node" data-level="1">1</div>
                <div class="lvl-node" data-level="2">2</div>
                <div class="lvl-node" data-level="3">3</div>
                <div class="lvl-node" data-level="4">4</div>
                <div class="lvl-node" data-level="5">5</div>
                <div class="lvl-node" data-level="6">6</div>
                <div class="lvl-node" data-level="7">7</div>
                <div class="lvl-node" data-level="8">8</div>
                <div class="lvl-node" data-level="9">9</div>
                <div class="lvl-node" data-level="10">10</div>
            </div>
            <button class="btn" onclick="logout()">Log Out</button>
        </div>

        <div class="bg-floating-fruit">🍒</div>
        <div class="bg-floating-fruit">🥝</div>
        <div class="bg-floating-fruit">🥑</div>
        <div class="bg-floating-fruit">🌶</div>
        <div class="bg-floating-fruit">🍎</div>
        <div class="bg-floating-fruit">🍇</div>
        <div class="bg-floating-fruit">🍌</div>
        <div class="bg-floating-fruit">🍊</div>
        <div class="bg-floating-fruit">🍍</div>
        <div class="bg-floating-fruit">🥭</div>
        <div class="bg-floating-fruit">🍒</div>
        <div class="bg-floating-fruit">🥝</div>
        <div class="bg-floating-fruit">🥑</div>
        <div class="bg-floating-fruit">🌶</div>
        <div class="bg-floating-fruit">🍎</div>
        <div class="bg-floating-fruit">🍇</div>
        <div class="bg-floating-fruit">🍌</div>
        <div class="bg-floating-fruit">🍊</div>
        <div class="bg-floating-fruit">🍍</div>
        <div class="bg-floating-fruit">🥭</div>

    </div>

     <div id="story-screen" class="" style="z-index: 1001; background: rgba(0,0,0,0.85);">
        <div class="story-wrapper" id="story-wrapper">
        </div>
        <div class="story-controls">
            <button class="btn" onclick="nextStoryPanel()">Next</button>
            <button class="btn" onclick="skipStory()">Skip</button>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="settingsModal" class="settings-Modal">
        <div class="modal-content">
            <div class="settings-header">
                <span>Settings</span>
                <button class="close-btn" onclick="closeSettings()">
                    <i class="fa-solid fa-x"></i>
                </button>
            </div>

            <div class="player-card">
                <img src="./img/avatar.png" class="avatar" alt="avatar">
                <div class="player-info">
                    <div class="name-row">
                        <span class="player-name" id="playerName">Player_Name</span>

                        <input type="text" id="nameInput" class="name-input" style="display:none;" />

                        <button class="edit-btn" onclick="enableEdit()">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                    </div>
                    <input type="text" id="nameInput" class="name-input" />
                    <div class="player-id" id="playerExtra">ID: 4545454</div>
                </div>
            </div>

             <button class="logout-btn">Log out</button>

            <div class="bottom-row">
                <div class="follow-icons">Follow us:
                    <div class="small-circle"><i class="fa-brands fa-facebook-f"></i></div>
                    <div class="small-circle"><i class="fa-brands fa-instagram"></i></div>
                </div>

                <div class="icon-group">
                    <div class="small-circle" onclick="toggleMusic()">
                        <i class="fa-solid fa-music" id="music-icon"></i>
                    </div>
                    <div class="small-circle" onclick="toggleSound()">
                        <i class="fa-solid fa-volume-high" id="sound-icon"></i>
                    </div>
                    <div class="small-circle">
                        <button id="theme-toggle" class="theme-btn">
                            <i id="theme-icon" class="fas fa-moon"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="version">V1.4v1.2</div>
        </div>
    </div>

    <audio id="bg-music" src="./audio/song2.mp3" loop hidden></audio>
    <script src="js/script.js"></script>
</body>

</html>
